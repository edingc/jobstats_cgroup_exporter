---
name: Release Docker

# Requires the following repository configuration before it will succeed:
#   - Repository variable DOCKERHUB_USERNAME (Settings > Secrets and variables >
#     Actions > Variables) set to your Docker Hub username.
#   - Repository secret DOCKERHUB_TOKEN set to a Docker Hub access token.
# If you do not publish container images you can safely delete this workflow.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-docker:
    runs-on: ubuntu-latest
    name: Release Docker
    steps:

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set environment
        run: |
          echo "BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD 2>/dev/null)" >> $GITHUB_ENV
          echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into Docker Hub registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          build-args: |
            BRANCH=${{ env.BRANCH }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            COMMIT=${{ env.COMMIT }}
            VERSION=${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/jobstats_cgroup_exporter:latest
            ${{ vars.DOCKERHUB_USERNAME }}/jobstats_cgroup_exporter:${{ env.VERSION }}

      - name: Echo image digest
        run: echo ${{ steps.build-and-push.outputs.digest }}
